<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luke & Leia's Laser</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>

    </style>
</head>
<body>
    <div id="status">Starting livestream...</div>
    <video id="stream" autoplay muted playsinline></video>

    <script>
        // WebRTC video connection
        async function connect() {
            const video = document.getElementById("stream");
            const status = document.getElementById("status");
            const pc = new RTCPeerConnection();

            pc.ontrack = (e) => {
                status.style.display = "none";
                video.style.display = "block";
                video.srcObject = e.streams[0];
            };
            pc.addTransceiver("video", { direction: "recvonly" });

            try {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                const res = await fetch("/stream/laserCam/whep", {
                    method: "POST",
                    headers: { "Content-Type": "application/sdp" },
                    body: pc.localDescription.sdp
                });

                if (res.status !== 200 && res.status !== 201) {
                    throw new Error("Stream not ready");
                }

                const answer = await res.text();
                await pc.setRemoteDescription({ type: "answer", sdp: answer });

            } catch (err) {
                setTimeout(connect, 500);
            }
        }
        connect();
    </script>
    
    <script>
        // SocketIO connection
        var socket = io({
            path: '/socket.io/'
        });
    </script>
</body>
</html>
