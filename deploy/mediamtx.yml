logLevel: info
logDestinations: [stdout]

# API Control Interface
api: true
apiAddress: :9997
apiAllowOrigins: ['*']

# RTSP Configuration
rtsp: true
rtspTransports: [udp, tcp]
rtspAddress: :8554
rtpAddress: :8040
rtcpAddress: :8041

# Turned off to save hardware constraints
rtmp: false
srt: false

# HLS Web Portal Configuration
hls: true
hlsAddress: :8000
hlsVariant: lowLatency
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsMuxerCloseAfter: 10s

# WebRTC Live Configuration
webrtc: true
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189

# Stream Path
paths:
  laserCam:
    source: publisher
    record: false